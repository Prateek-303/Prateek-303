<svg viewBox="0 0 680 48" xmlns="http://www.w3.org/2000/svg" width="100%">
  <style>
    .trace { fill: none; stroke: #1a3a6e; stroke-width: 1.5; }
    .dot { fill: #1a3a6e; }

    /* Signal pulses travelling along traces */
    .pulse1 { fill: none; stroke: #00b4d8; stroke-width: 2; stroke-linecap: round;
              stroke-dasharray: 18 800;
              animation: travel1 3.2s linear infinite; }
    .pulse2 { fill: none; stroke: #7eb8f7; stroke-width: 1.5; stroke-linecap: round;
              stroke-dasharray: 12 800;
              animation: travel2 4.1s linear 0.8s infinite; }
    .pulse3 { fill: none; stroke: #3fb950; stroke-width: 1.5; stroke-linecap: round;
              stroke-dasharray: 10 800;
              animation: travel3 2.8s linear 1.5s infinite; }
    .pulse4 { fill: none; stroke: #00b4d8; stroke-width: 1; stroke-linecap: round;
              stroke-dasharray: 8 800;
              animation: travel4 3.8s linear 2.2s infinite; }

    /* Node glow pulses */
    .node-glow { animation: glow 2s ease-in-out infinite; }
    .node-glow2 { animation: glow 2s ease-in-out 0.7s infinite; }
    .node-glow3 { animation: glow 2s ease-in-out 1.4s infinite; }
    @keyframes glow {
      0%,100% { opacity: 0.3; r: 3; }
      50%      { opacity: 1;   r: 5; }
    }

    @keyframes travel1 { from { stroke-dashoffset:  800; } to { stroke-dashoffset: -18; } }
    @keyframes travel2 { from { stroke-dashoffset:  800; } to { stroke-dashoffset: -12; } }
    @keyframes travel3 { from { stroke-dashoffset:  800; } to { stroke-dashoffset: -10; } }
    @keyframes travel4 { from { stroke-dashoffset:  800; } to { stroke-dashoffset:  -8; } }
  </style>

  <!-- Background traces (static PCB lines) -->
  <!-- Top trace: left → corner → right -->
  <polyline class="trace" points="0,12 90,12 106,24 340,24 356,12 680,12"/>
  <!-- Bottom trace -->
  <polyline class="trace" points="0,36 80,36 96,24 200,24"/>
  <polyline class="trace" points="480,24 584,36 680,36"/>
  <!-- Short vertical stubs -->
  <line class="trace" x1="200" y1="24" x2="200" y2="14"/>
  <line class="trace" x1="340" y1="24" x2="340" y2="14"/>
  <line class="trace" x1="480" y1="24" x2="480" y2="14"/>

  <!-- PCB nodes (solder joints) -->
  <circle class="dot" cx="106" cy="24" r="3"/>
  <circle class="dot" cx="200" cy="24" r="3"/>
  <circle class="dot" cx="340" cy="24" r="3"/>
  <circle class="dot" cx="480" cy="24" r="3"/>
  <circle class="dot" cx="584" cy="24" r="3"/>
  <circle class="dot" cx="356" cy="12" r="3"/>
  <circle class="dot" cx="96"  cy="24" r="3"/>

  <!-- Glowing nodes -->
  <circle class="node-glow"  cx="200" cy="24" r="3" fill="#00b4d8"/>
  <circle class="node-glow2" cx="340" cy="24" r="3" fill="#7eb8f7"/>
  <circle class="node-glow3" cx="480" cy="24" r="3" fill="#3fb950"/>

  <!-- Animated signal pulses along traces -->
  <polyline class="pulse1" points="0,12 90,12 106,24 340,24 356,12 680,12"/>
  <polyline class="pulse2" points="0,36 80,36 96,24 200,24 340,24 480,24 584,36 680,36"/>
  <polyline class="pulse3" points="0,12 90,12 106,24 200,24"/>
  <polyline class="pulse4" points="480,24 584,36 680,36"/>
</svg>
